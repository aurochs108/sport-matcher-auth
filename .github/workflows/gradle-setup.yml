name: Gradle Setup

on:
  workflow_call:
    inputs:
      gradle-task:
        required: true
        type: string

jobs:
  run:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew ${{ inputs.gradle-task }}